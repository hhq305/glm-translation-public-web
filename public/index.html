<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLM 科研翻译工作流</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container">
    <section class="hero">
      <div>
        <h1>GLM 科研翻译工作流</h1>
        <p>一次请求内完成 Prompt 生成、术语提取、翻译和检查，减少 API 限流风险。</p>
      </div>
      <div class="badge" id="modelBadge">Model</div>
    </section>

    <section class="panel grid">
      <label>
        文本类型
        <select id="textType">
          <option value="paper">论文正文</option>
          <option value="reviewer">回复审稿人</option>
          <option value="email">英文邮件</option>
          <option value="ppt">PPT讲稿</option>
          <option value="caption">图注 / 表注</option>
          <option value="general">通用翻译</option>
        </select>
      </label>

      <label>
        翻译方向
        <select id="direction">
          <option value="auto">自动判断</option>
          <option value="zh_to_en">中文 → 英文</option>
          <option value="en_to_zh">英文 → 中文</option>
        </select>
      </label>

      <label id="accessCodeWrap" class="hidden">
        访问码
        <input id="accessCode" type="password" placeholder="请输入访问码" />
      </label>
    </section>

    <section class="panel">
      <div class="section-title">
        <h2>原文</h2>
        <button id="clearBtn" class="ghost">清空</button>
      </div>
      <textarea id="sourceText" placeholder="把需要翻译的内容粘贴到这里。"></textarea>
      <div class="small" id="lengthHint">0 字符</div>
    </section>

    <section class="panel">
      <div class="section-title">
        <h2>自定义术语表，可选</h2>
        <button id="loadBaseGlossaryBtn" class="ghost">加载基础术语</button>
      </div>
      <textarea id="userGlossary" class="glossary" placeholder="例如：\n汲取液 = draw solution\n鸟粪石 = struvite\n外接电阻 = external resistance"></textarea>
    </section>

    <section class="actions">
      <button id="translateBtn">一键完成工作流</button>
      <button id="copyResultBtn" class="secondary">复制结果</button>
      <button id="downloadBtn" class="secondary">下载 Markdown</button>
    </section>

    <section class="panel status hidden" id="statusBox"></section>

    <section class="panel output hidden" id="promptBoxWrap">
      <div class="section-title">
        <h2>Prompt 与术语表</h2>
      </div>
      <pre id="promptBox"></pre>
    </section>

    <section class="panel output hidden" id="resultBoxWrap">
      <div class="section-title">
        <h2>完整结果</h2>
      </div>
      <pre id="resultBox"></pre>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
